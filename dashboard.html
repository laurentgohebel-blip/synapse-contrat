<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Synapse RH — Dashboard BI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2E75B6;--blue-l:#EBF3FC;
  --green:#059669;--green-l:#D1FAE5;
  --amber:#D97706;--amber-l:#FEF3C7;
  --red:#DC2626;--red-l:#FEE2E2;
  --purple:#7C3AED;--purple-l:#EDE9FE;
  --teal:#0D9488;--teal-l:#CCFBF1;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;
  --g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g900:#111827;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--g100);color:var(--g900);min-height:100vh}
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:220px;background:var(--g900);flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-dot{width:34px;height:34px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:15px;font-weight:700;flex-shrink:0}
.logo-text{color:white;font-size:14px;font-weight:600;line-height:1.2}
.logo-sub{color:var(--g400);font-size:10px;margin-top:2px}
.nav{padding:12px 8px;flex:1}
.nav-label{font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--g400);font-size:13px;margin-bottom:2px;text-decoration:none;transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:white}
.nav-item.active{background:var(--blue);color:white}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
.btn-new{display:block;text-align:center;background:var(--blue);color:white;padding:9px;border-radius:var(--r);font-size:12.5px;font-weight:600;text-decoration:none;transition:.15s}
.btn-new:hover{opacity:.88}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;border-bottom:1px solid var(--g200);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-label{font-size:12px;color:var(--green);font-weight:500}
.btn-refresh{padding:6px 14px;background:white;border:1px solid var(--g200);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--g700)}
.btn-refresh:hover{border-color:var(--blue);color:var(--blue)}

.content{padding:20px 24px;overflow-y:auto;flex:1}

/* Empty state */
.empty-state{text-align:center;padding:4rem 2rem;background:white;border:1px solid var(--g200);border-radius:var(--rl)}
.empty-icon{font-size:48px;margin-bottom:1rem}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--g400);margin-bottom:1.5rem}
.btn-go{display:inline-block;padding:10px 24px;background:var(--blue);color:white;border-radius:var(--r);font-size:14px;font-weight:500;text-decoration:none}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:white;border:1px solid var(--g200);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden}
.kpi-accent{position:absolute;top:0;left:0;width:3px;height:100%}
.kpi-label{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-val{font-size:28px;font-weight:700;line-height:1}
.kpi-sub{font-size:12px;color:var(--g400);margin-top:4px}

/* Cards */
.charts-row{display:grid;gap:14px;margin-bottom:14px}
.r2{grid-template-columns:1fr 1fr}
.r3{grid-template-columns:2fr 1fr}
.chart-card{background:white;border:1px solid var(--g200);border-radius:var(--rl);padding:18px}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:600;color:var(--g700)}
.chart-sub{font-size:11px;color:var(--g400);margin-top:2px}
.chart-tag{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--blue-l);color:var(--blue);font-weight:500;flex-shrink:0}
canvas{max-height:220px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:9px 12px;font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--g200);background:var(--g50)}
td{padding:10px 12px;border-bottom:1px solid var(--g100);color:var(--g700);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:var(--g50)}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500}
.pill-cdi{background:var(--blue-l);color:var(--blue)}
.pill-cdd{background:var(--amber-l);color:var(--amber)}
.pill-alt{background:var(--purple-l);color:var(--purple)}
.btn-view{padding:4px 10px;border:1px solid var(--g200);border-radius:6px;font-size:11px;cursor:pointer;background:white;color:var(--g700)}
.btn-view:hover{border-color:var(--blue);color:var(--blue)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:var(--rl);max-width:700px;width:100%;max-height:85vh;display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--g400);line-height:1;padding:4px 8px}
.modal-body{padding:20px;overflow-y:auto;flex:1;font-size:12.5px;line-height:1.9;white-space:pre-wrap;font-family:'Georgia',serif;color:var(--g900)}

/* Progress */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog-label{font-size:12px;color:var(--g700);width:110px;flex-shrink:0}
.prog-wrap{flex:1;height:8px;background:var(--g100);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px}
.prog-count{font-size:12px;color:var(--g400);width:24px;text-align:right}

@media(max-width:900px){
  .sidebar{display:none}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .r2,.r3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-dot">S</div>
    <div><div class="logo-text">Synapse RH</div><div class="logo-sub">Dashboard BI</div></div>
  </div>
  <nav class="nav">
    <div class="nav-label">Analyse</div>
    <a class="nav-item active" href="dashboard.html">📊 Vue globale</a>
    <a class="nav-item" href="dashboard.html">📄 Contrats générés</a>
    <a class="nav-label" style="display:block;margin-top:12px">Actions</a>
    <a class="nav-item" href="index.html">✦ Nouveau contrat</a>
  </nav>
  <div class="sidebar-footer">
    <a class="btn-new" href="index.html">+ Nouveau contrat</a>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Dashboard BI — Contrats générés</div>
    <div class="topbar-right">
      <div class="live-dot"></div>
      <span class="live-label">Données en temps réel</span>
      <button class="btn-refresh" onclick="init()">↻ Actualiser</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <!-- rempli par JS -->
  </div>
</div>
</div>

<!-- Modal contrat -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Contrat de travail</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
Chart.defaults.font.family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";
Chart.defaults.font.size=11;
Chart.defaults.color='#6B7280';
const GRID='rgba(0,0,0,.05)';
let charts={};

function mk(id,cfg){if(charts[id])charts[id].destroy();const c=document.getElementById(id);if(!c)return;charts[id]=new Chart(c.getContext('2d'),cfg);return charts[id];}

function loadData(){
  return JSON.parse(localStorage.getItem('synapse_contrats')||'[]');
}

function openModal(id){
  const data=loadData();
  const entry=data.find(d=>d.id===id);
  if(!entry)return;
  document.getElementById('modal-title').textContent=`Contrat — ${entry.employe} · ${entry.type}`;
  document.getElementById('modal-body').textContent=entry.contratTexte||'Texte non disponible.';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function pillClass(type){
  if(type.includes('CDI'))return 'pill-cdi';
  if(type.includes('CDD'))return 'pill-cdd';
  return 'pill-alt';
}

function formatDate(iso){
  if(!iso)return'—';
  try{return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}catch{return iso;}
}

function init(){
  const data=loadData();
  const content=document.getElementById('main-content');

  if(data.length===0){
    content.innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Aucun contrat généré pour l'instant</div>
        <div class="empty-sub">Générez votre premier contrat depuis le formulaire.<br>Les données apparaîtront ici automatiquement.</div>
        <a class="btn-go" href="index.html">Créer un contrat →</a>
      </div>`;
    return;
  }

  // ── Calculs ──────────────────────────────────────────────────────────────
  const total=data.length;
  const totalSalaire=data.reduce((s,d)=>s+(d.salaireBrut||0),0);
  const moyenneSalaire=Math.round(totalSalaire/total);
  const types=data.reduce((acc,d)=>{acc[d.type]=(acc[d.type]||0)+1;return acc;},{});
  const services=data.reduce((acc,d)=>{const s=d.service||'Autre';acc[s]=(acc[s]||0)+1;return acc;},{});
  const employeurs=data.reduce((acc,d)=>{acc[d.employeur]=(acc[d.employeur]||0)+1;return acc;},{});
  const topType=Object.entries(types).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';

  // Évolution par mois
  const byMonth={};
  data.forEach(d=>{
    if(!d.dateISO)return;
    const m=new Date(d.dateISO).toLocaleDateString('fr-FR',{month:'short',year:'2-digit'});
    byMonth[m]=(byMonth[m]||0)+1;
  });
  const mKeys=Object.keys(byMonth).slice(-6);
  const mVals=mKeys.map(k=>byMonth[k]);

  // ── Rendu HTML ───────────────────────────────────────────────────────────
  content.innerHTML=`
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="kpi-label">Contrats générés</div><div class="kpi-val" style="color:var(--blue)">${total}</div><div class="kpi-sub">depuis le début</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="kpi-label">Salaire moyen brut</div><div class="kpi-val" style="color:var(--green)">${moyenneSalaire>0?moyenneSalaire.toLocaleString('fr-FR')+'€':'—'}</div><div class="kpi-sub">par mois</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="kpi-label">Type dominant</div><div class="kpi-val" style="font-size:16px;padding-top:6px;color:var(--amber)">${topType}</div><div class="kpi-sub">${types[topType]||0} contrat(s)</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--purple)"></div><div class="kpi-label">Masse salariale</div><div class="kpi-val" style="color:var(--purple)">${totalSalaire>0?(totalSalaire/1000).toFixed(0)+'k€':'—'}</div><div class="kpi-sub">brut mensuel total</div></div>
    </div>

    <!-- Charts row 1 -->
    <div class="charts-row r3">
      <div class="chart-card">
        <div class="chart-header"><div><div class="chart-title">Évolution des générations</div><div class="chart-sub">Contrats créés par mois</div></div><span class="chart-tag">Tendance</span></div>
        <canvas id="chartEvol"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-header"><div><div class="chart-title">Types de contrats</div><div class="chart-sub">Répartition</div></div></div>
        <canvas id="chartTypes"></canvas>
      </div>
    </div>

    <!-- Charts row 2 -->
    <div class="charts-row r2">
      <div class="chart-card">
        <div class="chart-header"><div><div class="chart-title">Contrats par service</div></div></div>
        <div id="progServices"></div>
      </div>
      <div class="chart-card">
        <div class="chart-header"><div><div class="chart-title">Salaires bruts</div><div class="chart-sub">Distribution par contrat</div></div></div>
        <canvas id="chartSalaires"></canvas>
      </div>
    </div>

    <!-- Table -->
    <div class="chart-card" style="margin-bottom:14px">
      <div class="chart-header"><div><div class="chart-title">Tous les contrats générés</div><div class="chart-sub">${total} contrat(s) · cliquez sur Voir pour lire le texte complet</div></div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Employé</th><th>Employeur</th><th>Poste</th><th>Service</th><th>Type</th><th>Salaire brut</th><th></th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  `;

  // ── Charts ───────────────────────────────────────────────────────────────
  const COLORS=['#2E75B6','#059669','#D97706','#7C3AED','#0D9488','#DC2626','#9CA3AF'];

  mk('chartEvol',{type:'line',data:{labels:mKeys.length?mKeys:['—'],datasets:[{label:'Contrats',data:mVals.length?mVals:[0],borderColor:'#2E75B6',backgroundColor:'rgba(46,117,182,.08)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#2E75B6',fill:true,tension:.4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:GRID},beginAtZero:true,ticks:{stepSize:1}},x:{grid:{display:false}}}}});

  const typeKeys=Object.keys(types);
  const typeVals=typeKeys.map(k=>types[k]);
  mk('chartTypes',{type:'doughnut',data:{labels:typeKeys.length?typeKeys:['Aucun'],datasets:[{data:typeVals.length?typeVals:[1],backgroundColor:typeKeys.length?COLORS.slice(0,typeKeys.length):['#E5E7EB'],borderWidth:2,borderColor:'white'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:12}}},cutout:'65%'}});

  // Services progress
  const svcEntries=Object.entries(services).sort((a,b)=>b[1]-a[1]);
  const maxSvc=svcEntries[0]?.[1]||1;
  document.getElementById('progServices').innerHTML=svcEntries.length?svcEntries.map(([k,v],i)=>`
    <div class="prog-row">
      <span class="prog-label">${k}</span>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(v/maxSvc*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
      <span class="prog-count">${v}</span>
    </div>`).join(''):'<p style="font-size:12px;color:var(--g400)">—</p>';

  // Salaires scatter
  const salData=data.filter(d=>d.salaireBrut>0).map((d,i)=>({x:i+1,y:d.salaireBrut}));
  mk('chartSalaires',{type:'bar',data:{labels:data.filter(d=>d.salaireBrut>0).map(d=>d.employe.split(' ')[0]),datasets:[{label:'Salaire brut (€)',data:data.filter(d=>d.salaireBrut>0).map(d=>d.salaireBrut),backgroundColor:'rgba(46,117,182,.7)',borderColor:'#2E75B6',borderWidth:1,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:GRID},beginAtZero:false,ticks:{callback:v=>v.toLocaleString('fr-FR')+'€'}},x:{grid:{display:false}}}}});

  // Table
  document.getElementById('tableBody').innerHTML=data.map(d=>`
    <tr>
      <td>${formatDate(d.dateISO)}</td>
      <td><strong>${d.employe}</strong></td>
      <td>${d.employeur}</td>
      <td>${d.poste||'—'}</td>
      <td>${d.service||'—'}</td>
      <td><span class="pill ${pillClass(d.type)}">${d.type}</span></td>
      <td>${d.salaireBrut?d.salaireBrut.toLocaleString('fr-FR')+' €':'—'}</td>
      <td><button class="btn-view" onclick="openModal(${d.id})">Voir</button></td>
    </tr>
  `).join('');
}

init();
// Auto-refresh toutes les 10 secondes
setInterval(init, 10000);
</script>
</body>
</html>
